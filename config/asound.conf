# ALSA configuration for HiFiBerry DAC+
# Card number is templated by setup.sh at install time.
# Marker: PIYANO_CARD_NUM (replaced with detected card number)

pcm.!default {
    type hw
    card PIYANO_CARD_NUM
    device 0
}

ctl.!default {
    type hw
    card PIYANO_CARD_NUM
}

defaults.pcm.rate 48000
defaults.pcm.dmix.rate 48000
