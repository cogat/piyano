[tools]
"ubi:koalaman/shellcheck" = "latest"
"ubi:mvdan/sh" = "latest"

[tasks.lint]
description = "Lint all shell scripts with shellcheck"
run = "shellcheck setup.sh tweaks/*.sh"

[tasks.fmt]
description = "Format all shell scripts with shfmt"
run = "shfmt -w -i 2 -ci setup.sh tweaks/*.sh"

[tasks.check]
description = "Run lint and format check (CI-friendly)"
run = ["shfmt -d -i 2 -ci setup.sh tweaks/*.sh", "shellcheck setup.sh tweaks/*.sh"]
